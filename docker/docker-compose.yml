# ─────────────────────────────────────────────────────────────
# LocalChain — Docker Compose Testnet
#
# Usage:
#   make testnet-up       # Start the testnet
#   make testnet-down     # Stop and remove containers
#   make testnet-logs     # Tail all logs
#   make testnet-status   # Show container status
#   make testnet-clean    # Remove all data volumes
#
# Architecture:
#   validator-1   — Single validator + REST API (ports 26657/1317)
#   api-gateway   — Express API proxy (port 4000)
#   dashboard     — Next.js frontend (port 3000)
#
# Note: Single-validator testnet for development.
# Multi-validator requires manual gentx coordination.
# ─────────────────────────────────────────────────────────────

services:

  # ── Validator 1 ───────────────────────────────────────────
  validator-1:
    build:
      context: ..
      dockerfile: docker/validator/Dockerfile
    container_name: lc-validator-1
    volumes:
      - validator-1-data:/root/.localchaind
      - ./genesis/genesis.json:/genesis/genesis.json:ro
      - ./genesis/validator-1/priv_validator_key.json:/keys/priv_validator_key.json:ro
    environment:
      - NODE_NAME=validator-1
      - MONIKER=validator-1
      - SEEDS=
      - PERSISTENT_PEERS=
    ports:
      - "26656:26656"
      - "26657:26657"
      - "1317:1317"
      - "26660:26660"
    networks:
      - localchain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build:
      context: ../dashboard/backend
      dockerfile: ../../docker/api-gateway/Dockerfile
    container_name: lc-api
    ports:
      - "4000:4000"
    environment:
      - API_PORT=4000
      - API_HOST=0.0.0.0
      - COSMOS_REST=http://validator-1:1317
      - TENDERMINT_RPC=http://validator-1:26657
      - KNOWN_NODES=validator-1
    networks:
      - localchain
    depends_on:
      validator-1:
        condition: service_healthy

  # ── Dashboard Frontend ────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard/frontend
      dockerfile: ../../docker/dashboard/Dockerfile
    container_name: lc-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    networks:
      - localchain
    depends_on:
      - api-gateway

networks:
  localchain:
    driver: bridge

volumes:
  validator-1-data:
