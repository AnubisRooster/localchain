global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "localchain-api"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["host.docker.internal:4000"]
        labels:
          service: "localchain-api"
          environment: "local"

  - job_name: "validator-1"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["validator-1:26660"]
        labels:
          service: "tendermint"
          node: "validator-1"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
