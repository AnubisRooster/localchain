syntax = "proto3";

package localchain.records.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "localchain/records/v1/params.proto";

option go_package = "localchain/x/records/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc CreateRecord(MsgCreateRecord) returns (MsgCreateRecordResponse);
}

// MsgCreateRecord defines the MsgCreateRecord message.
message MsgCreateRecord {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string data = 2;
  string summary = 3;
  string content = 4;
  string content_type = 5;
  string file_name = 6;
  string tags = 7;
  string labels = 8;
  string content_hash = 9;
}

// MsgCreateRecordResponse defines the MsgCreateRecordResponse message.
message MsgCreateRecordResponse {
  uint64 record_id = 1;
}
