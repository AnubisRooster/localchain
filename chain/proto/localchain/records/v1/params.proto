syntax = "proto3";
package localchain.records.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "localchain/x/records/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "localchain/x/records/Params";
  option (gogoproto.equal) = true;
}
